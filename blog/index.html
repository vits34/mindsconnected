<!DOCTYPE html>
<html lang="en" style="font-size: 16px; scroll-behavior: smooth;">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Minds Connected</title>
  <meta name="description" content="Insights on Agile, OKRs, leadership, and business transformation from the Minds Connected team.">
  <link rel="stylesheet" href="../css/nicepage.css">
  <link rel="stylesheet" href="../css/mc-header.css">
  <link rel="icon" type="image/png" href="../images/default-logo.png">
  <link id="u-theme-google-font" rel="stylesheet"
    href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,500,600,700|Bai+Jamjuree:400,500,600,700">
  <style>
    html, body { overflow-x: hidden; max-width: 100%; margin: 0; padding: 0; }
    body { background: #f7f7fb; font-family: 'Open Sans', sans-serif; padding-top: 72px; }

    /* Hero */
    .mc-blog-hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #2d1b4e 100%);
      padding: 72px 24px 56px;
      text-align: center;
    }
    .mc-blog-hero h1 {
      font-family: 'Bai Jamjuree', sans-serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700; color: #fff; margin: 0 0 16px;
    }
    .mc-blog-hero p {
      font-size: 1.05rem; color: #aaa; max-width: 540px;
      margin: 0 auto; line-height: 1.7;
    }

    /* Grid */
    .mc-blog-grid {
      max-width: 1060px; margin: 0 auto;
      padding: 56px 24px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
    }

    /* Card */
    .mc-card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      overflow: hidden; display: flex; flex-direction: column;
      transition: transform 0.3s cubic-bezier(0.22,1,0.36,1),
                  box-shadow 0.3s cubic-bezier(0.22,1,0.36,1);
      text-decoration: none; color: inherit;
    }
    .mc-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    }
    .mc-card-accent {
      height: 5px;
      background: linear-gradient(90deg, #e84a90, #7b5ea7);
    }
    .mc-card-body { padding: 22px 22px 18px; flex: 1; display: flex; flex-direction: column; }
    .mc-card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .mc-card-tag {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: #e84a90;
      background: rgba(232,74,144,0.08);
      padding: 2px 9px; border-radius: 20px;
    }
    .mc-card-title {
      font-family: 'Bai Jamjuree', sans-serif;
      font-size: 1.05rem; font-weight: 700;
      color: #1a1a2e; margin: 0 0 10px; line-height: 1.4;
    }
    .mc-card-excerpt {
      font-size: 0.845rem; color: #666;
      line-height: 1.7; flex: 1; margin: 0 0 16px;
    }
    .mc-card-footer {
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid #f0f0f0; padding-top: 13px;
      font-size: 0.78rem; color: #999;
    }
    .mc-card-read {
      font-size: 0.78rem; font-weight: 700; color: #e84a90;
      letter-spacing: 0.3px;
    }

    /* Empty state */
    .mc-empty {
      text-align: center; padding: 80px 24px; color: #999;
      font-size: 1rem;
    }

    /* Footer */
    .mc-footer {
      background: #1a1a2e; color: #aaa;
      text-align: center; padding: 32px 24px;
      font-size: 0.8rem;
    }
    .mc-footer a { color: #e84a90; text-decoration: none; }

    @media (max-width: 600px) {
      .mc-header { padding: 0 16px; }
      .mc-header nav a { padding: 8px 10px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <header class="mc-header">
    <a href="/" class="mc-logo">
      <img src="../images/default-logo.png" alt="Minds Connected logo">
      <span>Minds Connected</span>
    </a>
    <nav class="mc-nav" id="mc-nav">
      <a href="/#services">Services</a>
      <a href="/#team">Team</a>
      <a href="/blog/" class="active">Blog</a>
      <a href="/#contact">Contact</a>
    </nav>
    <button class="mc-hamburger" id="mc-hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <div class="mc-blog-hero">
    <h1>Insights &amp; Ideas</h1>
    <p>Thoughts on Agile, OKRs, leadership, and building companies people love to work in.</p>
  </div>

  <div class="mc-blog-grid" id="posts-grid">
    <p class="mc-empty">Loading posts…</p>
  </div>

  <footer class="mc-footer">
    <p>&copy; 2026 Minds Connected &nbsp;|&nbsp; <a href="/">Back to main site</a></p>
  </footer>

  <script>
    (function () {
      var grid = document.getElementById('posts-grid');

      fetch('posts.json')
        .then(function (r) { return r.json(); })
        .then(function (posts) {
          if (!posts.length) {
            grid.innerHTML = '<p class="mc-empty">No posts yet — check back soon.</p>';
            return;
          }
          grid.innerHTML = posts.map(function (p) {
            var date = new Date(p.date).toLocaleDateString('en-GB', {
              day: 'numeric', month: 'long', year: 'numeric'
            });
            var tags = (p.tags || []).map(function (t) {
              return '<span class="mc-card-tag">' + t + '</span>';
            }).join('');
            return '<a class="mc-card" href="post.html?slug=' + encodeURIComponent(p.slug) + '">'
              + '<div class="mc-card-accent"></div>'
              + '<div class="mc-card-body">'
              + (tags ? '<div class="mc-card-tags">' + tags + '</div>' : '')
              + '<h2 class="mc-card-title">' + p.title + '</h2>'
              + '<p class="mc-card-excerpt">' + p.excerpt + '</p>'
              + '<div class="mc-card-footer">'
              + '<span>' + date + '</span>'
              + '<span class="mc-card-read">Read &rarr;</span>'
              + '</div>'
              + '</div>'
              + '</a>';
          }).join('');
        })
        .catch(function () {
          grid.innerHTML = '<p class="mc-empty">Could not load posts. Please try again later.</p>';
        });
    })();
  </script>

  <script>
    (function() {
      var ham = document.getElementById('mc-hamburger');
      var nav = document.getElementById('mc-nav');
      if (ham && nav) {
        ham.addEventListener('click', function() {
          ham.classList.toggle('open');
          nav.classList.toggle('open');
        });
        nav.querySelectorAll('a').forEach(function(a) {
          a.addEventListener('click', function() {
            ham.classList.remove('open');
            nav.classList.remove('open');
          });
        });
      }
    })();
  </script>

</body>
</html>
